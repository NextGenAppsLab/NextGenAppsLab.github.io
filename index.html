<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Платформа для сообщества</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
        }
        .page {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 14px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-demo {
            background: #2684ff;
            color: white;
        }
        .btn-video {
            background: white;
            color: #2684ff;
            border: 2px solid #2684ff;
        }
        .contacts {
            font-size: 16px;
            color: #777;
            line-height: 1.8;
        }
        .contacts a {
            color: #2684ff;
            text-decoration: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-box {
            max-width: 95vw;
            max-height: 85vh;
            width: auto;
            height: auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .video-wrap {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 85vh;
            line-height: 0;
        }
        .video-wrap video {
            max-width: 100%;
            max-height: 85vh;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .close-x {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 50%;
            text-align: center;
            line-height: 34px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: black;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            z-index: 10;
        }
        @media (max-width: 480px) {
            .close-x {
                width: 30px;
                height: 30px;
                line-height: 28px;
                font-size: 24px;
                top: -10px;
                right: -10px;
            }
        }
        .modal[style*="display: block"] {
            display: flex !important;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Хотите купить социальную сеть за 5000 руб?</h1>
        <p class="subtitle">Платформа для сообщества по цене нескольких чашек кофе</p>
        <div class="buttons">
            <a href="demo.html" class="btn btn-demo">Посмотреть сейчас</a>
            <button class="btn btn-video" id="videoBtn">Видео-презентация</button>
        </div>
        <div class="contacts">
            Готовы купить сейчас?  Напишите в чат:<br>
            Telegram: <a href="https://t.me/lainekd">@lainekd</a><br>
            Vk: <a href="https://vk.me/lainekd">@lainekd</a><br>
            Email: <a href="mailto:lainekd@mail.ru">lainekd@mail.ru</a>
        </div>
    </div>
    <div id="modal" class="modal">
        <div class="modal-box">
            <div class="video-wrap">
                <div class="close-x" id="closeModal">×</div>
                <video id="videoPlayer" controls preload="none"></video>
            </div>
        </div>
    </div>
    <script>
        (function(){
            var modal=document.getElementById('modal');
            var btn=document.getElementById('videoBtn');
            var close=document.getElementById('closeModal');
            var video=document.getElementById('videoPlayer');
            function openModal(){
                video.src=window.innerWidth<768?'video-mobile.mp4':'video-desktop.mp4';
                modal.style.display='flex';
                video.play().catch(function(e){});
            }
            function closeModal(){
                modal.style.display='none';
                video.pause();
                video.src='';
            }
            btn.onclick=function(e){
                e.preventDefault();
                openModal();
            };
            close.onclick=function(){
                closeModal();
            };
            modal.onclick=function(e){
                if(e.target===modal) closeModal();
            };
        })();
    </script>
</body>
</html>
